notes: >-
  Pennylane's own OAuth authorization server (RFC 8414 metadata at
  /.well-known/oauth-authorization-server) advertises a set of read-only mcp:* scopes
  (mcp:account:read, mcp:customer_invoice:read, mcp:transaction:read, mcp:vat_return:read,
  ..., plus mcp:private_api) and Dynamic Client Registration with PKCE S256 — a
  first-party Model Context Protocol OAuth surface. No public MCP endpoint URL or tool
  catalog is documented in the developer docs yet, so this is recorded as partial /
  first-party-auth-confirmed rather than a fully published server. Several mature
  community MCP servers wrap the v2 API and are listed under community_servers.
first_party:
  oauth_surface: true
  authorization_server: https://app.pennylane.com/.well-known/oauth-authorization-server
  auth: OAuth 2.0 authorization_code + PKCE (S256), Dynamic Client Registration
  registration_endpoint: https://app.pennylane.com/oauth/register
  scopes:
  - mcp:account:read
  - mcp:changelog:read
  - mcp:company:read
  - mcp:customer:read
  - mcp:customer_invoice:read
  - mcp:customer_payment:read
  - mcp:financial_report:read
