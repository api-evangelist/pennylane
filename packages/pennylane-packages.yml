notes: >-
  Pennylane does not publish an official first-party client SDK or CLI. The
  pennylane-hq GitHub organization hosts internal Ruby/Rails utilities and banking
  format parsers (cfonb, ofx, sepa_king, epics, liberic-ruby), not an API client.
  The libraries below are community / third-party clients, most auto-generated from
  Pennylane's OpenAPI. official is false for all of them.
