aid: pennylane
url: https://raw.githubusercontent.com/api-evangelist/pennylane/refs/heads/main/apis.yml
name: Pennylane
kind: company
description: Pennylane is a French financial and accounting operating system for SMEs
  and accounting firms. The Company API (v2) lets companies, firms, and integration
  partners access and sync invoicing, accounting, banking, and financial data over
  a REST interface, and automate end-to-end workflows. V2 is the stable version; V1
  is deprecated. All amounts are in EUR and the platform is built around French
  accounting (FEC exports, Plateforme Agréée e-invoicing, SEPA/GoCardless mandates).
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- Accounting
- Invoicing
- Fintech
- Financial Data
- Banking
- France
- SME
created: '2026-07-17'
modified: '2026-07-17'
specificationVersion: '0.19'
